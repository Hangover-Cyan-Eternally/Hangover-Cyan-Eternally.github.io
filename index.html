<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：添加视口适配，解决手机端布局问题 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>子乍弄鸟尊 3D 展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #f0f0f0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        // 1. 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        // 2. 创建相机（优化手机端视角）
        const camera = new THREE.PerspectiveCamera(
            75, // 视角
            window.innerWidth / window.innerHeight, // 宽高比
            0.1, // 近裁剪面
            1000 // 远裁剪面
        );
        // 调整相机位置，确保看向模型中心
        camera.position.set(0, 1, 5); // 手机端合适的初始位置
        camera.lookAt(0, 0, 0); // 强制相机看向坐标原点

        // 3. 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 适配手机像素
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. 添加轨道控制器（支持旋转/缩放）
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 平滑阻尼效果
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0); // 控制器围绕原点旋转
        controls.minDistance = 2; // 最小缩放距离
        controls.maxDistance = 10; // 最大缩放距离

        // 5. 添加光源
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // 6. 加载GLB模型（核心：强制居中）
        const loader = new THREE.GLTFLoader();
        loader.load(
            '子乍弄鸟尊.glb', // 模型文件路径
            function (gltf) {
                const model = gltf.scene;
                
                // 关键：重置模型位置到坐标原点
                model.position.set(0, 0, 0);
                model.rotation.set(0, 0, 0); // 重置旋转
                model.scale.set(1, 1, 1); // 重置缩放

                // 可选：自动调整模型大小（防止模型过大/过小）
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxSize = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxSize; // 统一缩放至合适大小
                model.scale.set(scale, scale, scale);

                scene.add(model);
            },
            function (xhr) {
                // 加载进度
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                // 加载错误
                console.error('模型加载失败：', error);
            }
        );

        // 7. 响应式适配（窗口大小变化时更新）
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 8. 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 更新控制器
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
